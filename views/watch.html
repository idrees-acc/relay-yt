<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashara 1448 Relay</title>
  <link rel="icon" type="image/png" href="/hussain.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <style>
    :root {
      --green-900: #14532d;
      --green-800: #166534;
      --green-700: #15803d;
      --gold: #d4a843;
      --gold-light: #e8c972;
      --bg: #0c0c0c;
      --header-bg: rgba(20, 83, 45, 0.92);
      --text: #fafafa;
      --text-muted: rgba(255, 255, 255, 0.7);
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      height: 48px;
      background: var(--header-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(212, 168, 67, 0.25);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .header-logo {
      width: 28px;
      height: auto;
    }

    header h1 {
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--gold-light);
    }

    .logout-btn {
      background: none;
      border: 1px solid rgba(212, 168, 67, 0.35);
      color: var(--gold-light);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.375rem 0.875rem;
      border-radius: 6px;
      transition: all 0.15s;
    }

    .logout-btn:hover {
      background: rgba(212, 168, 67, 0.12);
      border-color: rgba(212, 168, 67, 0.5);
    }

    .player-wrap {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .plyr,
    .plyr__video-embed,
    .plyr__video-wrapper {
      height: 100% !important;
      width: 100% !important;
    }

    .plyr--video {
      height: 100%;
    }

    /* Theme Plyr controls to match green/gold */
    :root {
      --plyr-color-main: var(--green-700);
      --plyr-video-control-color: #ffffff;
      --plyr-video-control-background-hover: var(--green-800);
      --plyr-range-fill-background: var(--gold);
      --plyr-range-thumb-background: var(--gold-light);
      --plyr-video-controls-background: linear-gradient(transparent, rgba(20, 83, 45, 0.85));
      --plyr-badge-background: var(--green-800);
      --plyr-tooltip-background: var(--green-900);
      --plyr-menu-background: rgba(20, 83, 45, 0.95);
      --plyr-menu-color: #ffffff;
    }

    @media screen and (max-width: 480px) {
      header {
        padding: 0 0.75rem;
        height: 44px;
      }

      header h1 {
        font-size: 0.75rem;
      }

      .header-logo {
        width: 24px;
      }

      .logout-btn {
        padding: 0.3rem 0.7rem;
        font-size: 0.7rem;
      }

      .player-wrap {
        top: 44px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <img src="/hussain.png" alt="" class="header-logo">
      <h1>Ashara 1448 Relay</h1>
    </div>
    <form method="POST" action="/logout">
      <button type="submit" class="logout-btn">Log out</button>
    </form>
  </header>
  <div class="player-wrap">
    <div id="player" data-plyr-provider="youtube" data-plyr-embed-id="{{YOUTUBE_VIDEO_ID}}"></div>
  </div>
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  <script>
    var player = new Plyr('#player', {
      controls: [
        'play-large',
        'play',
        'progress',
        'current-time',
        'duration',
        'mute',
        'volume',
        'captions',
        'settings',
        'fullscreen'
      ],
      settings: ['captions', 'quality', 'speed'],
      ratio: '16:9',
      clickToPlay: true,
      disableContextMenu: true,
      hideControls: true,
      keyboard: { focused: true, global: true },
      youtube: {
        noCookie: false,
        rel: 0,
        showinfo: 0,
        modestbranding: 1,
        playsinline: 1
      }
    });
  </script>
</body>
</html>
